<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <div id="app" class="w-full max-w-md mx-auto">
        <div class="bg-[#18181b] rounded-2xl shadow-2xl overflow-hidden border border-zinc-800">

            <div class="bg-zinc-300 text-zinc-900 p-6 flex items-center gap-4 rounded-t-2xl">
                <div class="bg-zinc-400 p-3 rounded-full bg-opacity-30">
                    <i data-lucide="list-todo" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold">Mis Tareas</h1>
                    <p class="text-zinc-700 text-sm font-medium">{{ tareasPendientes }} tareas pendientes</p>
                </div>
            </div>

            <div class="p-6">
                <div
                    class="flex gap-2 mb-6 bg-[#09090b] border border-zinc-800 rounded-xl p-1 focus-within:border-zinc-500 transition">
                    <input v-model="nuevaTarea" @keyup.enter="agregarTarea" type="text" placeholder="Nueva tarea..."
                        class="flex-1 bg-transparent p-2 text-sm outline-none text-white placeholder-zinc-500">

                    <select v-model="prioridadActual"
                        class="bg-[#18181b] text-xs text-zinc-300 border border-zinc-700 rounded-lg px-2 outline-none cursor-pointer">
                        <option value="Baja">Baja</option>
                        <option value="Media">Media</option>
                        <option value="Alta">Alta</option>
                    </select>

                    <select v-model="categoriaActual"
                        class="bg-[#18181b] text-xs text-zinc-300 border border-zinc-700 rounded-lg px-2 outline-none cursor-pointer">
                        <option value="Trabajo">Trabajo</option>
                        <option value="Estudios">Estudios</option>
                        <option value="Personal">Personal</option>
                        <option value="Compras">Compras</option>
                        <option value="Hogar">Hogar</option>
                        <option value="Salud">Salud</option>
                        <option value="Evento">Evento</option>
                        <option value="Otros">Otros</option>
                    </select>
                    <button @click="agregarTarea"
                        class="bg-zinc-200 text-zinc-900 px-3 rounded-lg hover:bg-white transition flex items-center justify-center font-bold">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                    </button>
                </div>

                <div
                    class="flex bg-[#09090b] rounded-lg p-1 mb-6 text-sm font-medium text-zinc-500 border border-zinc-800/50">
                    <button @click="filtroActual = 'todas'"
                        :class="{'bg-[#18181b] text-white shadow-sm border border-zinc-700/50': filtroActual === 'todas'}"
                        class="flex-1 py-1.5 rounded-md transition">Todas</button>
                    <button @click="filtroActual = 'pendientes'"
                        :class="{'bg-[#18181b] text-white shadow-sm border border-zinc-700/50': filtroActual === 'pendientes'}"
                        class="flex-1 py-1.5 rounded-md transition">Pendientes</button>
                    <button @click="filtroActual = 'completadas'"
                        :class="{'bg-[#18181b] text-white shadow-sm border border-zinc-700/50': filtroActual === 'completadas'}"
                        class="flex-1 py-1.5 rounded-md transition">Completadas</button>
                </div>

                <select v-model="filtroCategoria"
                    class="w-full bg-[#18181b] text-xs text-zinc-300 border border-zinc-700 rounded-lg px-3 py-2 mb-6 outline-none cursor-pointer">
                    <option value="todas">Todas las categorías</option>
                    <option value="Trabajo">Trabajo</option>
                    <option value="Estudios">Estudios</option>
                    <option value="Personal">Personal</option>
                    <option value="Compras">Compras</option>
                    <option value="Hogar">Hogar</option>
                    <option value="Salud">Salud</option>
                    <option value="Evento">Evento</option>
                    <option value="Otros">Otros</option>
                </select>
                <ul class="space-y-3 mb-6">
                    <li v-for="tarea in tareasFiltradas" :key="tarea.id"
                        class="flex flex-col gap-2 bg-[#09090b] p-4 rounded-xl border border-zinc-800 hover:border-zinc-700 transition group cursor-pointer"
                        @click="toggleCompletada(tarea)">

                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3 flex-1">

                                <!-- Botón Checkbox Corregido -->
                                <button class="transition flex-shrink-0">
                                    <!-- Icono completado (Verde) -->
                                    <span v-show="tarea.completada" class="text-green-500">
                                        <i data-lucide="check-circle-2" class="w-5 h-5"></i>
                                    </span>
                                    <!-- Icono pendiente (Gris) -->
                                    <span v-show="!tarea.completada" class="text-zinc-500 hover:text-white">
                                        <i data-lucide="circle" class="w-5 h-5"></i>
                                    </span>
                                </button>

                                <!-- Modo Edición vs Modo Lectura -->
                                <input v-if="tarea.editando" v-model="tarea.texto" @keyup.enter="guardarEdicion(tarea)"
                                    @click.stop
                                    class="flex-1 bg-[#18181b] border border-zinc-600 rounded px-2 py-1 text-sm text-white outline-none">
                                <span v-else
                                    :class="{'line-through text-zinc-600': tarea.completada, 'text-zinc-200': !tarea.completada}"
                                    class="text-sm transition select-none flex-1 break-all">
                                    {{ tarea.texto }}
                                </span>
                            </div>

                            <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition">
                                <!-- Botón Editar -->
                                <button v-if="!tarea.editando && !tarea.completada" @click.stop="activarEdicion(tarea)"
                                    class="text-zinc-500 hover:text-blue-400 transition">
                                    <i data-lucide="pencil" class="w-4 h-4"></i>
                                </button>
                                <!-- Botón Guardar -->
                                <button v-if="tarea.editando" @click.stop="guardarEdicion(tarea)"
                                    class="text-green-500 hover:text-green-400 transition">
                                    <i data-lucide="save" class="w-4 h-4"></i>
                                </button>
                                <!-- Botón Eliminar -->
                                <button @click.stop="eliminarTarea(tarea.id)"
                                    class="text-zinc-600 hover:text-red-500 transition">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Etiqueta de Prioridad -->
                        <div class="ml-8">
                            <span :class="{
                                'bg-red-500/10 text-red-400 border-red-500/20': tarea.prioridad === 'Alta',
                                'bg-yellow-500/10 text-yellow-400 border-yellow-500/20': tarea.prioridad === 'Media',
                                'bg-blue-500/10 text-blue-400 border-blue-500/20': tarea.prioridad === 'Baja'
                            }" class="text-[10px] font-bold px-2 py-0.5 rounded border">
                                {{ tarea.prioridad }}
                            </span>
                            <span class="ml-2 text-[10px] font-bold px-2 py-0.5 rounded border bg-zinc-800 text-zinc-300 border-zinc-700">
                                {{ tarea.categoria }}
                            </span>
                        </div>
                    </li>

                    <li v-if="tareasFiltradas.length === 0"
                        class="text-center text-zinc-500 text-sm py-6 bg-[#09090b] rounded-xl border border-dashed border-zinc-800">
                        No hay tareas para mostrar.
                    </li>
                </ul>

                <div class="flex items-center justify-between text-xs text-zinc-500 pt-4 border-t border-zinc-800/80">
                    <span>{{ totalTareas }} tareas en total</span>
                    <button @click="limpiarTodo" v-if="tareas.length > 0"
                        class="hover:text-zinc-300 transition hover:underline">Limpiar todo</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
