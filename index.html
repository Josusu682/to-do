<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Vue.js -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-[#09090b] text-gray-100 font-sans min-h-screen flex flex-col items-center pt-10 px-4">

    <div id="app" class="w-full max-w-md mx-auto">
        <!-- Tarjeta Principal -->
        <div class="bg-[#18181b] rounded-2xl shadow-2xl overflow-hidden border border-zinc-800">

            <!-- Encabezado (Header) -->
            <div class="bg-zinc-300 text-zinc-900 p-6 flex items-center gap-4 rounded-t-2xl">
                <div class="bg-zinc-400 p-3 rounded-full bg-opacity-30">
                    <i data-lucide="list-todo" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold">Mis Tareas</h1>
                    <p class="text-zinc-700 text-sm font-medium">{{ tareasPendientes }} tareas pendientes</p>
                </div>
            </div>

            <div class="p-6">
                <!-- Input para nueva tarea -->
                <div class="flex gap-2 mb-6">
                    <input v-model="nuevaTarea" @keyup.enter="agregarTarea" type="text"
                        placeholder="Agregar una nueva tarea..."
                        class="flex-1 bg-[#09090b] border border-zinc-800 rounded-xl p-3 text-sm outline-none focus:border-zinc-500 transition text-white placeholder-zinc-500">
                    <button @click="agregarTarea"
                        class="bg-zinc-200 text-zinc-900 px-4 rounded-xl hover:bg-white transition flex items-center justify-center font-bold">
                        <i data-lucide="plus" class="w-5 h-5"></i>
                    </button>
                </div>

                <!-- Filtros -->
                <div
                    class="flex bg-[#09090b] rounded-lg p-1 mb-6 text-sm font-medium text-zinc-500 border border-zinc-800/50">
                    <button @click="filtroActual = 'todas'"
                        :class="{'bg-[#18181b] text-white shadow-sm border border-zinc-700/50': filtroActual === 'todas'}"
                        class="flex-1 py-1.5 rounded-md transition">Todas</button>
                    <button @click="filtroActual = 'pendientes'"
                        :class="{'bg-[#18181b] text-white shadow-sm border border-zinc-700/50': filtroActual === 'pendientes'}"
                        class="flex-1 py-1.5 rounded-md transition">Pendientes</button>
                    <button @click="filtroActual = 'completadas'"
                        :class="{'bg-[#18181b] text-white shadow-sm border border-zinc-700/50': filtroActual === 'completadas'}"
                        class="flex-1 py-1.5 rounded-md transition">Completadas</button>
                </div>

                <!-- Lista de Tareas -->
                <ul class="space-y-3 mb-6">
                    <li v-for="tarea in tareasFiltradas" :key="tarea.id"
                        class="flex items-center justify-between bg-[#09090b] p-4 rounded-xl border border-zinc-800 hover:border-zinc-700 transition group cursor-pointer"
                        @click="toggleCompletada(tarea)">

                        <div class="flex items-center gap-3">
                            <!-- Icono de Checkbox -->
                            <button class="text-zinc-500 hover:text-white transition flex-shrink-0">
                                <i v-if="tarea.completada" data-lucide="check-circle-2"
                                    class="w-5 h-5 text-zinc-300"></i>
                                <i v-else data-lucide="circle" class="w-5 h-5"></i>
                            </button>
                            <!-- Texto de la tarea -->
                            <span
                                :class="{'line-through text-zinc-600': tarea.completada, 'text-zinc-200': !tarea.completada}"
                                class="text-sm transition select-none">
                                {{ tarea.texto }}
                            </span>
                        </div>

                        <!-- Botón Eliminar (Aparece en hover) -->
                        <button @click.stop="eliminarTarea(tarea.id)"
                            class="text-zinc-600 hover:text-red-500 transition opacity-0 group-hover:opacity-100 flex-shrink-0">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </li>

                    <!-- Estado vacío -->
                    <li v-if="tareasFiltradas.length === 0"
                        class="text-center text-zinc-500 text-sm py-6 bg-[#09090b] rounded-xl border border-dashed border-zinc-800">
                        No hay tareas para mostrar aquí.
                    </li>
                </ul>

                <!-- Footer (Estadísticas y Limpieza) -->
                <div class="flex items-center justify-between text-xs text-zinc-500 pt-4 border-t border-zinc-800/80">
                    <span>{{ totalTareas }} tareas en total</span>
                    <button @click="limpiarTodo" v-if="tareas.length > 0"
                        class="hover:text-zinc-300 transition hover:underline">Limpiar todo</button>
                </div>
            </div>
        </div>

        <!-- Mensaje Motivacional -->
        <p class="text-center text-zinc-600 text-xs mt-6">Mantente organizado, una tarea a la vez.</p>
    </div>

    <script>
        const { createApp } = Vue

        createApp({
            data() {
                return {
                    nuevaTarea: '',
                    // Las tareas ahora son objetos con un ID único y un estado de completado
                    tareas: [],
                    filtroActual: 'todas' // 'todas', 'pendientes', 'completadas'
                }
            },
            computed: {
                // Propiedades computadas que se actualizan automáticamente
                tareasPendientes() {
                    return this.tareas.filter(t => !t.completada).length;
                },
                totalTareas() {
                    return this.tareas.length;
                },
                tareasFiltradas() {
                    if (this.filtroActual === 'pendientes') return this.tareas.filter(t => !t.completada);
                    if (this.filtroActual === 'completadas') return this.tareas.filter(t => t.completada);
                    return this.tareas;
                }
            },
            mounted() {
                // Al cargar la app, buscamos los datos (Cambié la key a 'mis-tareas-v2' para no chocar con las viejas que eran solo texto)
                const tareasGuardadas = localStorage.getItem('mis-tareas-v2');
                if (tareasGuardadas) {
                    this.tareas = JSON.parse(tareasGuardadas);
                }

                // Inicializa los iconos de Lucide
                this.$nextTick(() => {
                    lucide.createIcons();
                });
            },
            updated() {
                // Vuelve a inyectar los iconos cada vez que Vue actualiza el DOM (necesario al agregar/filtrar tareas)
                this.$nextTick(() => {
                    lucide.createIcons();
                });
            },
            watch: {
                // Si el arreglo cambia, guardamos la versión completa (con IDs y estados)
                tareas: {
                    handler(nuevasTareas) {
                        localStorage.setItem('mis-tareas-v2', JSON.stringify(nuevasTareas));
                    },
                    deep: true
                }
            },
            methods: {
                agregarTarea() {
                    if (this.nuevaTarea.trim() !== '') {
                        this.tareas.push({
                            id: Date.now(), // ID único basado en el timestamp
                            texto: this.nuevaTarea.trim(),
                            completada: false
                        });
                        this.nuevaTarea = '';
                    }
                },
                toggleCompletada(tarea) {
                    tarea.completada = !tarea.completada;
                },
                eliminarTarea(id) {
                    this.tareas = this.tareas.filter(t => t.id !== id);
                },
                limpiarTodo() {
                    if (confirm('¿Estás seguro de que quieres eliminar todas las tareas?')) {
                        this.tareas = [];
                    }
                }
            }
        }).mount('#app')
    </script>
</body>

</html>
